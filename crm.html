<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leads | Vivid Pulse CRM</title>
  </head>
  <body>

    <div class="cursor-glow" id="cursor-glow"></div>

    <!-- NAVBAR -->
    <header class="navbar">
      <div class="container">
        <a href="/" class="logo-container">
          <img src="/logo.png" alt="Vivid Pulse" class="logo-img" />
          <span class="brand-name">Vivid Pulse</span>
        </a>
        <nav class="nav-links" id="nav-links">
          <a href="/">Home</a>
          <a href="/websites">Websites</a>
          <a href="/crm" class="active">CRM</a>
          <a href="/content">Content</a>
          <a href="/login" class="btn btn-outline btn-sm" id="nav-signin">Sign In</a>
        </nav>
        <div class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></div>
      </div>
    </header>

    <!-- APP SHELL -->
    <main class="crm-app">

      <!-- Header row -->
      <div class="ca-topbar">
        <div>
          <h1 class="ca-title">Leads</h1>
          <div class="ca-subtitle" id="ca-subtitle">Loading…</div>
        </div>
        <button class="ca-add-btn" id="add-lead-btn">+ New Lead</button>
      </div>

      <!-- 3 KPI pills -->
      <div class="ca-kpis">
        <div class="ca-kpi">
          <span class="ca-kpi-val" id="kpi-total">0</span>
          <span class="ca-kpi-label">Total</span>
        </div>
        <div class="ca-kpi ca-kpi-danger">
          <span class="ca-kpi-val" id="kpi-overdue">0</span>
          <span class="ca-kpi-label">Overdue</span>
        </div>
        <div class="ca-kpi ca-kpi-success">
          <span class="ca-kpi-val" id="kpi-won">0</span>
          <span class="ca-kpi-label">Won</span>
        </div>
      </div>

      <!-- Stage filter tabs -->
      <div class="ca-tabs" id="ca-tabs">
        <button class="ca-tab active" data-stage="">All</button>
        <button class="ca-tab" data-stage="new">New</button>
        <button class="ca-tab" data-stage="contacted">Contacted</button>
        <button class="ca-tab" data-stage="proposal">Proposal</button>
        <button class="ca-tab" data-stage="won">Won</button>
        <button class="ca-tab" data-stage="lost">Lost</button>
      </div>

      <!-- Search -->
      <div class="ca-search-wrap">
        <span class="ca-search-icon">🔍</span>
        <input type="text" id="ca-search" class="ca-search" placeholder="Search by name, company, phone…" />
      </div>

      <!-- Lead cards -->
      <div id="leads-list" class="ca-leads-list"></div>
      <div id="leads-empty" class="ca-empty" style="display:none;">No leads yet. Add your first one →</div>

    </main>

    <!-- LEAD DETAIL PANEL -->
    <div class="lead-panel-overlay" id="lead-panel-overlay"></div>
    <aside class="lead-panel" id="lead-panel">

      <div class="lp-header">
        <div style="min-width:0;">
          <div class="lp-name" id="lp-name">—</div>
          <div style="font-size:0.8rem;color:var(--text-dim);margin-top:0.1rem;" id="lp-company-sub"></div>
        </div>
        <button class="crm-modal-close" id="lead-panel-close">✕</button>
      </div>

      <!-- Stage pills -->
      <div class="lp-stage-row">
        <div class="lp-stage-pills" id="lp-stage-pills">
          <button class="lp-stage-pill" data-stage="new">New</button>
          <button class="lp-stage-pill" data-stage="contacted">Contacted</button>
          <button class="lp-stage-pill" data-stage="proposal">Proposal</button>
          <button class="lp-stage-pill" data-stage="won">Won ✓</button>
          <button class="lp-stage-pill" data-stage="lost">Lost ✗</button>
        </div>
      </div>

      <div class="lp-body">

        <!-- Quick actions -->
        <div class="lp-section" id="lp-quick-actions"></div>

        <!-- Contact info -->
        <div class="lp-section">
          <div class="lp-section-label">Contact</div>
          <div class="lp-info-grid">
            <div class="lp-info-item">
              <div class="lp-info-label">Phone</div>
              <div class="lp-info-value" id="lp-phone">—</div>
            </div>
            <div class="lp-info-item">
              <div class="lp-info-label">Email</div>
              <div class="lp-info-value lp-info-ellipsis" id="lp-email">—</div>
            </div>
            <div class="lp-info-item">
              <div class="lp-info-label">Value</div>
              <div class="lp-info-value" id="lp-value">—</div>
            </div>
            <div class="lp-info-item">
              <div class="lp-info-label">Source</div>
              <div class="lp-info-value" id="lp-source">—</div>
            </div>
          </div>
        </div>

        <!-- Follow-up date -->
        <div class="lp-section">
          <div class="lp-section-label">Follow-up Date</div>
          <input type="date" id="lp-due-input" class="lp-input" style="width:100%;" />
          <button class="ca-save-due-btn" id="lp-save-due">Set Reminder</button>
        </div>

        <!-- Edit details (collapsed) -->
        <div class="lp-section">
          <div class="lp-section-label lp-toggle-row" id="lp-edit-toggle" style="cursor:pointer;">
            Edit Details <span id="lp-edit-arrow" style="font-size:0.7rem;margin-left:0.3rem;">▶</span>
          </div>
          <form id="lp-edit-form" style="display:none;margin-top:0.75rem;">
            <input type="hidden" id="lp-lead-id" />
            <div class="lp-form-group">
              <label class="lp-label">Name</label>
              <input type="text" id="lp-edit-name" class="lp-input" required />
            </div>
            <div class="lp-form-group">
              <label class="lp-label">Company</label>
              <input type="text" id="lp-edit-company" class="lp-input" />
            </div>
            <div class="lp-form-group">
              <label class="lp-label">Phone</label>
              <input type="tel" id="lp-edit-phone" class="lp-input" />
            </div>
            <div class="lp-form-group">
              <label class="lp-label">Email</label>
              <input type="email" id="lp-edit-email" class="lp-input" />
            </div>
            <div class="lp-form-group">
              <label class="lp-label">Deal Value (₹)</label>
              <input type="number" id="lp-edit-value" class="lp-input" min="0" />
            </div>
            <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
              <button type="submit" class="crm-btn crm-btn-primary crm-btn-sm" style="flex:1;">Save</button>
              <button type="button" class="crm-btn crm-btn-danger crm-btn-sm" id="lp-delete-btn">Delete</button>
            </div>
          </form>
        </div>

        <!-- Notes -->
        <div class="lp-section" style="flex:1;">
          <div class="lp-section-label">Notes</div>
          <div class="lp-timeline" id="lp-timeline"></div>
          <form id="lp-note-form" class="lp-note-input-row" style="margin-top:0.6rem;">
            <input type="text" id="lp-note-input" class="lp-input" placeholder="Add a note…" autocomplete="off" />
            <button type="submit" class="crm-btn crm-btn-primary crm-btn-sm">Add</button>
          </form>
        </div>

      </div>
    </aside>

    <!-- ADD LEAD MODAL -->
    <div class="crm-modal-overlay" id="add-lead-modal">
      <div class="crm-modal">
        <div class="crm-modal-header">
          <h3>New Lead</h3>
          <button class="crm-modal-close" id="modal-close">✕</button>
        </div>
        <form id="add-lead-form" class="crm-modal-body crm-form">
          <div class="crm-form-group">
            <label>Name *</label>
            <input type="text" id="lead-name" placeholder="Rahul Sharma" required />
          </div>
          <div class="crm-form-group">
            <label>Company</label>
            <input type="text" id="lead-company" placeholder="InnoTech Pvt Ltd" />
          </div>
          <div class="crm-form-row">
            <div class="crm-form-group">
              <label>Phone</label>
              <input type="tel" id="lead-phone" placeholder="+91 98765 43210" />
            </div>
            <div class="crm-form-group">
              <label>Email</label>
              <input type="email" id="lead-email" placeholder="rahul@company.com" />
            </div>
          </div>
          <div class="crm-form-row">
            <div class="crm-form-group">
              <label>Deal Value (₹)</label>
              <input type="number" id="lead-value" placeholder="50000" min="0" />
            </div>
            <div class="crm-form-group">
              <label>Source</label>
              <select id="lead-source">
                <option value="">Unknown</option>
                <option value="website">Website</option>
                <option value="referral">Referral</option>
                <option value="instagram">Instagram</option>
                <option value="facebook">Facebook</option>
                <option value="linkedin">LinkedIn</option>
                <option value="cold-call">Cold Call</option>
                <option value="event">Event</option>
              </select>
            </div>
          </div>
          <div class="crm-form-group">
            <label>Follow-up Date</label>
            <input type="date" id="lead-due" />
          </div>
          <div class="crm-form-group">
            <label>Note</label>
            <input type="text" id="lead-note" placeholder="Quick note about this lead…" />
          </div>
          <button type="submit" class="crm-btn crm-btn-primary" style="width:100%;justify-content:center;margin-top:0.25rem;">Add Lead</button>
        </form>
      </div>
    </div>

    <script type="module" src="/src/pages/crm.js"></script>
    <script type="module" src="/src/page-shared.js"></script>
  </body>
</html>
