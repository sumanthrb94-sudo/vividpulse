<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Vivid Pulse</title>
    <meta name="description" content="Sign in to access your Vivid Pulse CRM dashboard." />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  </head>
  <body>

    <div class="cursor-glow" id="cursor-glow"></div>
    <div class="bg-blobs">
      <div class="blob blob-1" style="background:var(--primary);"></div>
      <div class="blob blob-2" style="background:var(--secondary);"></div>
      <div class="blob blob-3"></div>
    </div>

    <!-- NAVBAR -->
    <header class="navbar">
      <div class="container">
        <a href="/" class="logo-container">
          <img src="/logo.png" alt="Vivid Pulse" class="logo-img" />
          <span class="brand-name">Vivid Pulse</span>
        </a>
      </div>
    </header>

    <!-- AUTH CARD -->
    <main class="auth-main container">
      <div class="auth-card">

        <div class="auth-header">
          <span class="hero-badge" style="background:rgba(34,211,238,0.08); border-color:rgba(34,211,238,0.2); color:var(--primary);">🔐 Secure Access</span>
          <h1 class="auth-title text-white-grad" id="auth-heading">Welcome back</h1>
          <p class="auth-sub" id="auth-sub">Sign in to access your CRM dashboard</p>
        </div>

        <!-- ERROR / SUCCESS MESSAGES -->
        <div class="auth-message" id="auth-error" style="display:none;"></div>
        <div class="auth-message auth-message--success" id="auth-success" style="display:none;"></div>

        <!-- TAB SWITCHER -->
        <div class="auth-tabs" id="auth-tabs">
          <button class="auth-tab active" data-tab="login">Sign In</button>
          <button class="auth-tab" data-tab="register">Create Account</button>
        </div>

        <!-- GOOGLE SIGN-IN -->
        <button class="btn-google" id="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <div class="auth-divider"><span>or</span></div>

        <!-- LOGIN FORM -->
        <form id="login-form" class="auth-form" autocomplete="on">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" minlength="6" />
          </div>
          <button type="submit" class="btn btn-primary btn-glow auth-submit" id="login-submit">
            Sign In →
          </button>
        </form>

        <!-- REGISTER FORM -->
        <form id="register-form" class="auth-form" style="display:none;" autocomplete="on">
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="Minimum 6 characters" required autocomplete="new-password" minlength="6" />
          </div>
          <div class="form-group">
            <label for="reg-confirm">Confirm Password</label>
            <input type="password" id="reg-confirm" placeholder="Repeat password" required autocomplete="new-password" minlength="6" />
          </div>
          <button type="submit" class="btn btn-primary btn-glow auth-submit" id="register-submit">
            Create Account →
          </button>
        </form>

      </div>
    </main>

    <style>
      /* ── Auth-specific styles ── */
      .auth-main {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .auth-card {
        width: 100%;
        max-width: 420px;
        background: var(--bg-card);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-md);
        padding: 2.5rem;
        backdrop-filter: blur(12px);
      }

      .auth-header {
        text-align: center;
        margin-bottom: 1.75rem;
      }

      .auth-title {
        font-size: clamp(1.5rem, 4vw, 2rem);
        margin: 0.75rem 0 0.4rem;
      }

      .auth-sub {
        color: var(--text-dim);
        font-size: 0.9rem;
      }

      .auth-message {
        padding: 0.75rem 1rem;
        border-radius: var(--radius-sm);
        font-size: 0.85rem;
        margin-bottom: 1.25rem;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
      }

      .auth-message--success {
        background: rgba(16, 185, 129, 0.1);
        border-color: rgba(16, 185, 129, 0.3);
        color: #6ee7b7;
      }

      .auth-tabs {
        display: flex;
        gap: 0.5rem;
        background: rgba(255,255,255,0.04);
        border-radius: var(--radius-sm);
        padding: 4px;
        margin-bottom: 1.5rem;
      }

      .auth-tab {
        flex: 1;
        padding: 0.55rem;
        border: none;
        background: transparent;
        color: var(--text-dim);
        font-family: var(--font-body);
        font-size: 0.875rem;
        font-weight: 500;
        border-radius: calc(var(--radius-sm) - 4px);
        cursor: pointer;
        transition: var(--transition);
      }

      .auth-tab.active {
        background: var(--primary);
        color: var(--bg-dark);
        font-weight: 600;
      }

      .btn-google {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        background: rgba(255,255,255,0.06);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm);
        color: var(--text-main);
        font-family: var(--font-body);
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition);
        margin-bottom: 1.25rem;
      }

      .btn-google:hover {
        background: rgba(255,255,255,0.1);
        border-color: var(--glass-border-hover);
        transform: translateY(-1px);
      }

      .btn-google:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .auth-divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
        color: var(--text-dim);
        font-size: 0.8rem;
      }

      .auth-divider::before,
      .auth-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--glass-border);
      }

      .auth-form .form-group {
        margin-bottom: 1rem;
      }

      .auth-form label {
        display: block;
        font-size: 0.825rem;
        font-weight: 500;
        color: var(--text-dim);
        margin-bottom: 0.4rem;
      }

      .auth-form input {
        width: 100%;
        padding: 0.7rem 0.9rem;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm);
        color: var(--text-main);
        font-family: var(--font-body);
        font-size: 0.9rem;
        transition: var(--transition);
        outline: none;
      }

      .auth-form input:focus {
        border-color: var(--primary);
        background: rgba(34,211,238,0.04);
        box-shadow: 0 0 0 3px rgba(34,211,238,0.12);
      }

      .auth-submit {
        width: 100%;
        justify-content: center;
        margin-top: 0.5rem;
        padding: 0.85rem;
        font-size: 0.95rem;
      }

      .auth-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
      }
    </style>

    <script type="module" src="/src/pages/login.js"></script>
  </body>
</html>
